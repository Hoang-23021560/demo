<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>HoangSkyLand - Giới thiệu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" th:href="@{/css/custom.css}"/>
</head>
<body class="bg-gray-50">
<div th:replace="~{fragments/header :: header}"></div>
<section class="relative pt-16 h-64 flex items-center justify-center">
    <div class="absolute inset-0 bg-cover bg-center hero-overlay"
         style="background-image: url('https://images.unsplash.com/photo-1486325212027-8081e485255e?w=1920&q=80');"></div>
    <div class="absolute inset-0 hero-overlay"></div>
    <div class="relative z-10 text-center">
        <h1 class="text-5xl font-extrabold text-white mb-3">Giới thiệu</h1>
        <nav class="flex items-center justify-center gap-2 text-sm">
            <a th:href="@{/}" class="text-green-300 hover:text-green-200">Trang chủ</a>
            <span class="text-gray-300">/</span>
            <span class="text-green-400 font-semibold">Giới thiệu</span>
        </nav>
    </div>
</section>
<section class="py-20 max-w-4xl mx-auto px-4">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-10 text-center">
        <h2 class="text-3xl font-bold text-gray-900 mb-4">Về <span class="text-green-500">HoangSkyLand</span></h2>
        <p class="text-gray-600 leading-relaxed max-w-2xl mx-auto">
            HoangSkyLand là nền tảng quản lý bất động sản thương mại hàng đầu, cung cấp giải pháp toàn diện cho việc quản lý tòa nhà văn phòng, mặt bằng cho thuê và khách hàng tiềm năng.
        </p>
    </div>
</section>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
