<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>HoangSkyLand - Liên hệ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" th:href="@{/css/custom.css}"/>
</head>
<body class="bg-gray-50">

<div th:replace="~{fragments/header :: header}"></div>

<!-- ══ HERO SECTION ══════════════════════════════════════════════ -->
<section class="relative pt-16 h-80 flex items-center justify-center overflow-hidden">
    <div class="absolute inset-0 bg-cover bg-center"
         style="background-image: url('https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?w=1920&q=80');">
    </div>
    <div class="absolute inset-0 hero-overlay"></div>
    <div class="relative z-10 text-center">
        <h1 class="text-5xl font-extrabold text-white mb-4 drop-shadow-lg">Liên hệ</h1>
        <nav class="flex items-center justify-center gap-1 text-sm">
            <a th:href="@{/}" class="text-green-300 hover:text-green-200 font-medium transition-colors">Trang chủ</a>
            <span class="text-gray-300 mx-2">/</span>
            <span class="text-green-400 font-semibold">Liên hệ</span>
        </nav>
    </div>
</section>

<!-- ══ CONTACT INFO + MAP ════════════════════════════════════════ -->
<section class="py-16">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

        <!-- Info cards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-14">
            <!-- Address -->
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-7 flex items-start gap-4 hover:shadow-md transition-shadow">
                <div class="w-12 h-12 bg-green-100 rounded-xl flex items-center justify-center shrink-0">
                    <svg class="w-6 h-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                    </svg>
                </div>
                <div>
                    <h3 class="font-bold text-gray-900 mb-1">Địa chỉ</h3>
                    <p class="text-gray-500 text-sm leading-relaxed">
                        144 Xuân Thủy, Cầu Giấy,<br/>Hà Nội, Việt Nam
                    </p>
                </div>
            </div>
            <!-- Phone -->
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-7 flex items-start gap-4 hover:shadow-md transition-shadow">
                <div class="w-12 h-12 bg-blue-100 rounded-xl flex items-center justify-center shrink-0">
                    <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
                    </svg>
                </div>
                <div>
                    <h3 class="font-bold text-gray-900 mb-1">Điện thoại</h3>
                    <p class="text-gray-500 text-sm">(024) 3754 7777</p>
                    <p class="text-gray-500 text-sm">Hotline: 1800 1234</p>
                </div>
            </div>
            <!-- Email -->
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-7 flex items-start gap-4 hover:shadow-md transition-shadow">
                <div class="w-12 h-12 bg-orange-100 rounded-xl flex items-center justify-center shrink-0">
                    <svg class="w-6 h-6 text-orange-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                    </svg>
                </div>
                <div>
                    <h3 class="font-bold text-gray-900 mb-1">Email</h3>
                    <p class="text-gray-500 text-sm">info@hoangskyland.vn</p>
                    <p class="text-gray-500 text-sm">support@hoangskyland.vn</p>
                </div>
            </div>
        </div>

        <!-- Map + Form -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- Google Maps embed — ĐH Công Nghệ, ĐHQG Hà Nội -->
            <div class="rounded-2xl overflow-hidden shadow-md border border-gray-200 h-96 lg:h-auto min-h-[400px]">
                <iframe
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3723.8634743838756!2d105.78210857501738!3d21.038029980610595!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3135ab5b40000001%3A0x2e064b3c79e5a7ac!2zVHLGsOG7nW5nIMSQ4bqhaSBo4buNYyBDw7RuZyBuZ2jhu4csIMSQSFFHSE4!5e0!3m2!1svi!2svn!4v1700000000000!5m2!1svi!2svn"
                    width="100%" height="100%" style="border:0; min-height:400px;"
                    allowfullscreen="" loading="lazy"
                    referrerpolicy="no-referrer-when-downgrade"
                    title="Trường Đại học Công nghệ - ĐHQGHN">
                </iframe>
            </div>

            <!-- Contact Form -->
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
                <h2 class="text-2xl font-bold text-gray-900 mb-2">Gửi tin nhắn</h2>
                <p class="text-gray-500 text-sm mb-6">Chúng tôi sẽ phản hồi trong vòng 24 giờ làm việc.</p>
                <form class="space-y-5">
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Họ và tên</label>
                            <input type="text" placeholder="Nguyễn Văn A"
                                   class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-green-400 focus:border-transparent transition"/>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Số điện thoại</label>
                            <input type="tel" placeholder="0901 234 567"
                                   class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-green-400 focus:border-transparent transition"/>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                        <input type="email" placeholder="email@example.com"
                               class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-green-400 focus:border-transparent transition"/>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Tiêu đề</label>
                        <input type="text" placeholder="Tôi muốn hỏi về..."
                               class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-green-400 focus:border-transparent transition"/>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Nội dung</label>
                        <textarea rows="4" placeholder="Nhập nội dung tin nhắn..."
                                  class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-green-400 focus:border-transparent transition resize-none"></textarea>
                    </div>
                    <button type="submit"
                            class="w-full py-3 bg-green-500 hover:bg-green-600 text-white font-bold rounded-xl transition-colors shadow-md">
                        Gửi tin nhắn
                    </button>
                </form>
            </div>
        </div>
    </div>
</section>

<div th:replace="~{fragments/footer :: footer}"></div>
<script th:src="@{/js/admin.js}"></script>
</body>
</html>
