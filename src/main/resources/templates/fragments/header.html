<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<!--/* ═══════════════════════════════════════════════════
     PUBLIC HEADER  –  dùng th:replace="fragments/header :: header"
     ═══════════════════════════════════════════════════ */-->
<header th:fragment="header" class="fixed top-0 left-0 right-0 z-50 bg-white shadow-md">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-16">

            <!-- Logo -->
            <a th:href="@{/}" class="flex items-center gap-2">
                <svg class="w-8 h-8 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                </svg>
                <span class="text-2xl font-bold text-green-500 tracking-tight">SkyLand</span>
                <span class="hidden sm:block text-xs text-gray-400 font-medium uppercase tracking-widest leading-none">Mua bán nhà đất</span>
            </a>

            <!-- Nav links (desktop) -->
            <nav class="hidden md:flex items-center gap-1">
                <a th:href="@{/}" class="nav-link px-4 py-2 text-sm font-semibold text-gray-700 hover:text-green-500 transition-colors">Trang chủ</a>
                <a th:href="@{/gioi-thieu}" class="nav-link px-4 py-2 text-sm font-semibold text-gray-700 hover:text-green-500 transition-colors">Giới thiệu</a>
                <a th:href="@{/san-pham}" class="nav-link px-4 py-2 text-sm font-semibold text-gray-700 hover:text-green-500 transition-colors">Sản phẩm</a>
                <a th:href="@{/tin-tuc}" class="nav-link px-4 py-2 text-sm font-semibold text-gray-700 hover:text-green-500 transition-colors">Tin tức</a>
                <a th:href="@{/lien-he}" class="nav-link px-4 py-2 text-sm font-semibold text-gray-700 hover:text-green-500 transition-colors">Liên hệ</a>
            </nav>

            <!-- Auth buttons -->
            <div class="flex items-center gap-2">
                <sec:authorize access="isAuthenticated()">
                    <a th:href="@{/admin/building}"
                       class="px-4 py-2 text-sm font-semibold text-white bg-green-500 hover:bg-green-600 rounded-lg transition-colors">
                        Quản trị
                    </a>
                    <form th:action="@{/logout}" method="post" class="inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit"
                                class="px-4 py-2 text-sm font-semibold text-green-600 border border-green-500 hover:bg-green-50 rounded-lg transition-colors">
                            Đăng xuất
                        </button>
                    </form>
                </sec:authorize>
                <sec:authorize access="!isAuthenticated()">
                    <a th:href="@{/login}"
                       class="px-4 py-2 text-sm font-semibold text-white bg-green-500 hover:bg-green-600 rounded-lg transition-colors">
                        Đăng nhập
                    </a>
                    <a th:href="@{/dang-ky}"
                       class="px-4 py-2 text-sm font-semibold text-green-600 border border-green-500 hover:bg-green-50 rounded-lg transition-colors">
                        Đăng ký
                    </a>
                </sec:authorize>
            </div>

            <!-- Mobile menu button -->
            <button onclick="document.getElementById('mobile-menu').classList.toggle('hidden')"
                    class="md:hidden p-2 rounded-md text-gray-600 hover:text-green-500">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                </svg>
            </button>
        </div>

        <!-- Mobile nav -->
        <div id="mobile-menu" class="hidden md:hidden pb-4">
            <a th:href="@{/}" class="block px-4 py-2 text-sm text-gray-700 hover:text-green-500">Trang chủ</a>
            <a th:href="@{/gioi-thieu}" class="block px-4 py-2 text-sm text-gray-700 hover:text-green-500">Giới thiệu</a>
            <a th:href="@{/san-pham}" class="block px-4 py-2 text-sm text-gray-700 hover:text-green-500">Sản phẩm</a>
            <a th:href="@{/tin-tuc}" class="block px-4 py-2 text-sm text-gray-700 hover:text-green-500">Tin tức</a>
            <a th:href="@{/lien-he}" class="block px-4 py-2 text-sm text-gray-700 hover:text-green-500">Liên hệ</a>
        </div>
    </div>
</header>
</body>
</html>
