<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>HoangSkyLand - Đăng ký</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" th:href="@{/css/custom.css}"/>
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-green-400 via-emerald-500 to-teal-600">
    <div class="relative z-10 w-full max-w-md mx-4">
        <div class="text-center mb-8">
            <a th:href="@{/}" class="inline-flex items-center gap-2">
                <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3"/>
                </svg>
                <span class="text-3xl font-extrabold text-white">SkyLand</span>
            </a>
        </div>
        <div class="login-card bg-white rounded-3xl p-8">
            <div class="text-center mb-6">
                <h1 class="text-3xl font-extrabold text-gray-900 mb-2">ĐĂNG KÝ</h1>
                <p class="text-gray-500 text-sm">Tạo tài khoản mới để bắt đầu</p>
            </div>
            <div class="bg-yellow-50 border border-yellow-200 rounded-xl p-4 text-center">
                <p class="text-yellow-700 text-sm font-medium">Tính năng đăng ký đang được phát triển.</p>
                <p class="text-yellow-600 text-xs mt-1">Vui lòng liên hệ quản trị viên để được cấp tài khoản.</p>
            </div>
            <p class="text-center text-sm text-gray-500 mt-6">
                Đã có tài khoản?
                <a th:href="@{/login}" class="text-green-500 hover:text-green-600 font-semibold">Đăng nhập</a>
            </p>
        </div>
    </div>
</body>
</html>
