<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>500 - Lỗi hệ thống</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-gray-50 to-slate-100 flex items-center justify-center">
    <div class="text-center px-4 max-w-lg">
        <div class="text-9xl font-black text-gray-200 mb-4 select-none">500</div>
        <h1 class="text-3xl font-bold text-gray-800 mb-3">Lỗi hệ thống</h1>
        <p class="text-gray-500 mb-8">
            Đã có lỗi xảy ra phía máy chủ. Vui lòng thử lại sau hoặc liên hệ quản trị viên.
        </p>
        <div class="flex flex-col sm:flex-row gap-3 justify-center">
            <button onclick="history.back()"
                    class="px-6 py-3 bg-gray-700 hover:bg-gray-800 text-white font-bold rounded-xl transition-colors">
                Quay lại
            </button>
            <a th:href="@{/}"
               class="px-6 py-3 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold rounded-xl transition-colors">
                Về trang chủ
            </a>
        </div>
    </div>
</body>
</html>
