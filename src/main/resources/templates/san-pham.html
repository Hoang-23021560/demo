<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>HoangSkyLand - Sản phẩm</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" th:href="@{/css/custom.css}"/>
</head>
<body class="bg-gray-50">

<div th:replace="~{fragments/header :: header}"></div>

<!-- Hero banner -->
<section class="relative pt-16 h-56 flex items-center justify-center overflow-hidden">
    <div class="absolute inset-0 bg-cover bg-center"
         style="background-image: url('https://images.unsplash.com/photo-1486325212027-8081e485255e?w=1920&q=80');"></div>
    <div class="absolute inset-0 hero-overlay"></div>
    <div class="relative z-10 text-center">
        <h1 class="text-5xl font-extrabold text-white mb-3">Sản phẩm</h1>
        <nav class="flex items-center justify-center gap-2 text-sm">
            <a th:href="@{/}" class="text-green-300 hover:text-green-200">Trang chủ</a>
            <span class="text-gray-300">/</span>
            <span class="text-green-400 font-semibold">Sản phẩm</span>
        </nav>
    </div>
</section>

<!-- Main content -->
<section class="py-12 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

    <!-- Search form -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 mb-8">
        <button type="button" onclick="toggleAccordion('search-body')"
                class="w-full flex items-center justify-between px-6 py-4 text-left">
            <span class="font-bold text-gray-800 text-base flex items-center gap-2">
                <svg class="w-5 h-5 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                </svg>
                Tìm kiếm tòa nhà
            </span>
            <svg data-accordion="search-body"
                 class="accordion-arrow open w-5 h-5 text-gray-400"
                 fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"/>
            </svg>
        </button>

        <div id="search-body" class="border-t border-gray-100">
            <form th:action="@{/san-pham/search}" method="post"
                  th:object="${searchRequest}" class="p-6">

                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                    <!-- Tên tòa nhà -->
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1 uppercase tracking-wide">Tên tòa nhà</label>
                        <input type="text" th:field="*{name}" placeholder="Nhập tên tòa nhà..."
                               class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-400"/>
                    </div>
                    <!-- Quận -->
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1 uppercase tracking-wide">Quận</label>
                        <select th:field="*{districtId}"
                                class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-400 bg-white">
                            <option value="">-- Tất cả quận --</option>
                            <option th:each="d : ${districts}"
                                    th:value="${d.id}"
                                    th:text="${d.nameDistrict}"></option>
                        </select>
                    </div>
                    <!-- Đường -->
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1 uppercase tracking-wide">Đường</label>
                        <input type="text" th:field="*{street}" placeholder="Tên đường..."
                               class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-400"/>
                    </div>
                    <!-- Diện tích từ -->
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1 uppercase tracking-wide">Diện tích từ (m²)</label>
                        <input type="number" th:field="*{rentAreaFrom}" placeholder="Từ..."
                               class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-400"/>
                    </div>
                    <!-- Diện tích đến -->
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1 uppercase tracking-wide">Diện tích đến (m²)</label>
                        <input type="number" th:field="*{rentAreaTo}" placeholder="Đến..."
                               class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-400"/>
                    </div>
                    <!-- Giá thuê từ -->
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1 uppercase tracking-wide">Giá thuê từ (tr/m²)</label>
                        <input type="number" step="0.1" th:field="*{rentPriceFrom}" placeholder="Từ..."
                               class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-400"/>
                    </div>
                </div>

                <!-- Loại mặt bằng -->
                <div class="mt-4 flex flex-wrap items-center gap-4">
                    <span class="text-xs font-semibold text-gray-500 uppercase tracking-wide">Loại:</span>
                    <label class="flex items-center gap-1.5 cursor-pointer text-sm text-gray-700">
                        <input type="checkbox" name="code" value="VAN_PHONG" class="w-4 h-4 text-green-500 rounded"/>
                        Văn phòng
                    </label>
                    <label class="flex items-center gap-1.5 cursor-pointer text-sm text-gray-700">
                        <input type="checkbox" name="code" value="TANG_TRET" class="w-4 h-4 text-green-500 rounded"/>
                        Tầng trệt
                    </label>
                    <label class="flex items-center gap-1.5 cursor-pointer text-sm text-gray-700">
                        <input type="checkbox" name="code" value="NGUYEN_CAN" class="w-4 h-4 text-green-500 rounded"/>
                        Nguyên căn
                    </label>
                    <label class="flex items-center gap-1.5 cursor-pointer text-sm text-gray-700">
                        <input type="checkbox" name="code" value="NOI_THAT" class="w-4 h-4 text-green-500 rounded"/>
                        Nội thất
                    </label>
                    <button type="submit"
                            class="ml-auto px-6 py-2 bg-green-500 hover:bg-green-600 text-white font-bold rounded-lg text-sm transition-all shadow flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                        </svg>
                        Tìm kiếm
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Results header -->
    <div class="flex items-center justify-between mb-5">
        <h2 class="text-xl font-bold text-gray-800">
            Danh sách tòa nhà
            <span th:if="${totalResults != null and totalResults > 0}"
                  class="ml-2 px-2.5 py-0.5 bg-green-100 text-green-700 text-sm font-semibold rounded-full"
                  th:text="${totalResults} + ' kết quả'"></span>
        </h2>
    </div>

    <!-- No results -->
    <div th:if="${#lists.isEmpty(buildings)}"
         class="bg-white rounded-2xl border border-gray-100 shadow-sm py-20 text-center text-gray-400">
        <svg class="w-14 h-14 mx-auto mb-4 text-gray-200" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
        </svg>
        <p class="text-sm font-medium">Không tìm thấy tòa nhà nào phù hợp.</p>
    </div>

    <!-- Building cards grid -->
    <div th:if="${not #lists.isEmpty(buildings)}"
         class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">

        <div th:each="b : ${buildings}"
             class="bg-white rounded-2xl shadow-sm border border-gray-100 hover:shadow-md transition-shadow overflow-hidden flex flex-col">

            <!-- Card image placeholder -->
            <div class="h-44 bg-gradient-to-br from-green-400 to-emerald-600 flex items-center justify-center">
                <svg class="w-16 h-16 text-white/60" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                          d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
                </svg>
            </div>

            <!-- Card body -->
            <div class="p-5 flex flex-col flex-1">
                <h3 class="font-bold text-gray-900 text-base mb-1 truncate" th:text="${b.name}"></h3>
                <p class="text-sm text-gray-500 mb-3 flex items-center gap-1">
                    <svg class="w-4 h-4 text-green-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                    </svg>
                    <span class="truncate" th:text="${b.address}"></span>
                </p>

                <!-- Stats row -->
                <div class="grid grid-cols-2 gap-2 mb-4">
                    <div class="bg-gray-50 rounded-lg p-2 text-center">
                        <p class="text-xs text-gray-400">Diện tích</p>
                        <p class="font-bold text-gray-800 text-sm"
                           th:text="${b.floorArea != null ? b.floorArea + ' m²' : '-'}"></p>
                    </div>
                    <div class="bg-gray-50 rounded-lg p-2 text-center">
                        <p class="text-xs text-gray-400">Giá thuê</p>
                        <p class="font-bold text-green-600 text-sm"
                           th:text="${b.rentPrice != null ? b.rentPrice + ' tr/m²' : '-'}"></p>
                    </div>
                    <div class="bg-gray-50 rounded-lg p-2 text-center">
                        <p class="text-xs text-gray-400">Tầng hầm</p>
                        <p class="font-bold text-gray-800 text-sm"
                           th:text="${b.numberOfBasement != null ? b.numberOfBasement : '-'}"></p>
                    </div>
                    <div class="bg-gray-50 rounded-lg p-2 text-center">
                        <p class="text-xs text-gray-400">Phí DV</p>
                        <p class="font-bold text-gray-800 text-sm"
                           th:text="${b.serviceFee != null ? b.serviceFee + ' tr/m²' : '-'}"></p>
                    </div>
                </div>

                <!-- Rent areas -->
                <p th:if="${b.rentAreas != null and !b.rentAreas.isEmpty()}"
                   class="text-xs text-gray-500 mb-3">
                    <span class="font-semibold text-gray-700">Diện tích thuê: </span>
                    <span th:text="${b.rentAreas} + ' m²'"></span>
                </p>

                <!-- Manager -->
                <div class="mt-auto pt-3 border-t border-gray-100 flex items-center gap-2 text-xs text-gray-500">
                    <svg class="w-4 h-4 text-gray-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                    </svg>
                    <span th:text="${b.managerName != null ? b.managerName : 'Chưa có'}"></span>
                    <span th:if="${b.managerPhone != null}" class="text-gray-400">·</span>
                    <span th:text="${b.managerPhone}"></span>
                </div>
            </div>
        </div>
    </div>

</section>

<div th:replace="~{fragments/footer :: footer}"></div>

<script th:src="@{/js/admin.js}"></script>
<script>
    function toggleAccordion(id) {
        const body = document.getElementById(id);
        body.classList.toggle('hidden');
        const arrow = document.querySelector('[data-accordion="' + id + '"]');
        if (arrow) arrow.classList.toggle('open');
    }
</script>
</body>
</html>
